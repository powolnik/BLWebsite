# render.yaml — BLACK LIGHT Collective
# JEDEN serwis obsługuje API + Frontend = zero dodatkowych kosztów!

databases:
  - name: blacklight-db
    databaseName: blacklight
    user: blacklight



services:
  - type: web
    name: blacklight-collective
    runtime: python

    rootDir: backend
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: NODE_VERSION
        value: 20.11.0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: blacklight-db
          property: connectionString
